name: Model HW CI

# MOCK MODE: the real step (run_ci.sh — full HW suite: generic op tests, then
# every model compiled from scratch + run from its cached bin, DRAM randomized
# before every pass) is commented out below in favor of a hello-world smoke
# test, so the runner/workflow plumbing (registration, triggers, artifact
# upload) can be validated without needing a working model suite yet.
# To switch back: delete the "Hello world (mock)" step and uncomment
# "Run CI suite".

on:
  workflow_dispatch:
    inputs:
      clean_bins:
        description: "Wipe cached compiled programs (programs.bin/json) first, forcing every model to recompile from scratch"
        required: false
        type: boolean
        default: false
      only:
        description: "Space-separated model names to restrict the run to (leave empty to run all models)"
        required: false
        type: string
        default: ""
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: model-hw-ci
  cancel-in-progress: false  # never cancel a run mid-flight on shared HW

jobs:
  hw-ci:
    runs-on: self-hosted
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hello world (mock)
        run: python3 -c "print('Hello, world! CI runner is wired up.')"

      # - name: Run CI suite
